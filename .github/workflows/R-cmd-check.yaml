name: R-CMD-check

on:
  pull_request:
    branches: [master]
  # for manual trigger
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Testing cache'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - name: Create this folder to silence warning
        run: mkdir -p ~/.nix-defexpr/channels

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      
      - name: Configure osmzhlab Attic cache
        run: bash .github/scripts/setup-osmzhlab-cache.sh

      # Install R package dependencies via nix-shell, using the default.nix file in the repository
      - name: Install R package dependencies
        run: nix-shell default.nix --run "echo 'R package dependencies installed'"

      # Run R CMD check via devtools::check()
      - name: Run R-CMD-check
        run: |
          nix-shell default.nix --run "Rscript -e \"
            devtools::check(vignettes = TRUE, error_on = 'warning')
          \""

      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: r-cmd-check-results
          path: "*.Rcheck/"
          retention-days: 14
