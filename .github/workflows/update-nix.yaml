name: Update default.nix

on:
  schedule:
    - cron: "0 22 * * 0"  # every Sunday at 22:00 UTC (1h before R-tests at 23:00)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual update'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-nix:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Create folder to silence Nix warning
        run: mkdir -p ~/.nix-defexpr/channels

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Regenerate default.nix via rix
        run: nix-shell -p rPackages.rix R --run "Rscript create_env.R"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet default.nix; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if default.nix changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="update-nix-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add default.nix
          git commit -m "chore: update default.nix via rix"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: update default.nix" \
            --body "Automated update of \`default.nix\` generated by \`create_env.R\` via rix. Auto-merges when CI passes." \
            --base master \
            --head "$BRANCH")
          gh pr merge "$PR_URL" --auto --squash
