name: R tests

on:
  pull_request:
    branches: [master]
  workflow_dispatch: # This adds the manual trigger
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Testing cache'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Create this folder to silence warning
        run: mkdir -p ~/.nix-defexpr/channels

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      ## Enable binary caches: rstats-on-nix for R packages
      - uses: cachix/cachix-action@v17
        with:
          name: rstats-on-nix
     
     ## mihem contains BPCells and any other packages not in rstats-on-nix
      - uses: cachix/cachix-action@v17
        with:
          name: mihem
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Install R package dependencies via nix-shell, using the default.nix file in the repository
      - name: Install R package dependencies
        run: nix-shell default.nix --run "echo 'R package dependencies installed'"

      ## Unit tests — load package from source via devtools::load_all(), no install needed
      - name: Run unit tests
        run: |
          nix-shell default.nix --run "Rscript -e \"
            devtools::load_all('.')
            testthat::test_file('tests/testthat/test-r-functions.R',
              reporter = testthat::default_reporter(),
              stop_on_failure = TRUE)
            testthat::test_file('tests/testthat/test-exportFromSeurat.R',
              reporter = testthat::default_reporter(),
              stop_on_failure = TRUE)
          \""

      ## shinytest2 integration tests — inst/app.R uses only library() calls, no cerebroAppLite needed
      - name: Run shinytest2 integration tests
        run: |
          nix-shell default.nix --run "Rscript -e \"
            testthat::test_file('tests/testthat/test-app-inst.R',
              reporter = testthat::default_reporter(),
              stop_on_failure = TRUE)
          \""

      ## Upload shinytest2 failure artifacts (PNG diffs, logs) — unit test failures are in the log
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shinytest2-failures
          path: |
            tests/testthat/_snaps/
            /tmp/shinytest2*
          retention-days: 14
