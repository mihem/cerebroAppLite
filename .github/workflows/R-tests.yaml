name: R tests

on:
  pull_request:
    branches: [master]
  workflow_dispatch: # This adds the manual trigger
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Testing cache'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Create this folder to silence warning
        run: mkdir -p ~/.nix-defexpr/channels

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Configure osmzhlab Attic cache
        run: bash .github/scripts/setup-osmzhlab-cache.sh

      # Install R package dependencies via nix-shell, using the default.nix file in the repository
      - name: Install R package dependencies
        run: nix-shell default.nix --run "echo 'R package dependencies installed'"

      ## Run all tests. The package is INSTALLED first (into a repo-local library
      ## the nix store lib is read-only) because the shinytest2 app tests launch a
      ## bundled app in a fresh subprocess that resolves the cerebroAppLite
      ## namespace at runtime -- load_all() alone is not visible to that
      ## subprocess. R_LIBS_USER is exported so both the test process and the
      ## shinytest2 subprocesses find the installed package. load_all() is still
      ## used for the in-process test code.
      - name: Run all unit/integration tests
        run: |
          nix-shell default.nix --run '
            export R_LIBS_USER="$PWD/.ci-rlib"
            mkdir -p "$R_LIBS_USER"
            R CMD INSTALL --no-multiarch --no-docs --library="$R_LIBS_USER" .
            Rscript -e "
              devtools::load_all(\".\")
              testthat::test_dir(
                path = \"tests/testthat\",
                reporter = testthat::default_reporter(),
                stop_on_failure = TRUE
              )
            "
          '

      ## Upload shinytest2 failure artifacts (PNG diffs, logs) — unit test failures are in the log
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shinytest2-failures
          path: |
            tests/testthat/_snaps/
            /tmp/shinytest2*
          retention-days: 14
