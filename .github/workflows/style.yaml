name: Style with air

on:
  pull_request_target:
    branches: [master]
    # Only run when R files are changed.
    # This also prevents an infinite loop: when the bot pushes styled commits
    # back to the PR branch, it would normally re-trigger this workflow.
    # Since air produces already-formatted code on the second run, no R files
    # are changed, so the paths filter prevents the workflow from running again.
    paths:
      - '**.R'
      - '**.r'
      - '**.Rmd'

permissions: write-all

jobs:
  style:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # pull_request_target gives us secrets even for fork PRs.
      # We explicitly check out the PR head (potentially from a fork) so air
      # formats the actual PR code. This is safe because air is a pure
      # formatter — it never executes untrusted code or sees the token value.
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Create folder to silence Nix warning
        run: mkdir -p ~/.nix-defexpr/channels

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - uses: cachix/cachix-action@v17
        with:
          name: rstats-on-nix

      - name: Run Air
        # --pure ignores the PR's environment variables and local nix files.
        # -I nixpkgs=channel:nixpkgs-unstable forces a remote channel so a
        # malicious default.nix/shell.nix in the PR cannot hijack the environment.
        run: nix-shell --pure -I nixpkgs=channel:nixpkgs-unstable -p air-formatter --run "air format ."

      - name: Commit and push changes if any
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # Use git ls-files with case-insensitive grep instead of glob *.R
          # because R files can have lowercase .r extension (e.g. send_enrichr_query.r)
          # and shell globs are case-sensitive on Linux.
          # The || true prevents failure if no R files are found at all.
          git add $(git ls-files --modified --others --exclude-standard | grep -iE '\.(R|Rmd)$') || true

          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "style: format code via air"
            # For fork PRs the remote is the fork repo; push to the PR head branch.
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.event.pull_request.head.repo.full_name }}.git"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
